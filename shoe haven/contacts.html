</header><section class="contact" id="contact">

<h2>Contact Shoe Haven</h2>

<form>

<label for="name">Full Name</label>
<input type="text" id="name" name="name" placeholder="Enter your name"><br/>

<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="Enter your email"><br/>

<label for="shoe">Select Shoe</label>
<select id="shoe" name="shoe">
<option>Haven Air</option>
<option>Street Haven</option>
<option>Haven Comfort</option>
</select><br/>

<label for="size">Shoe Size</label>
<input type="number" id="size" name="size" placeholder="Enter shoe size"><br/>

<label for="message">Message</label>
<textarea id="message" name="message" placeholder="Any special request"></textarea><br/>

<button type="submit">Submit</button><br/>

</form>

</section>
